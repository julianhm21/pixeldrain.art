<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        video {
            width: 90%;
            max-width: 320px;
            height: auto;
            border-radius: 8px;
        }

        .telegram-button {
            display: inline-block;
            margin-bottom: 10px;
            padding: 10px 20px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .telegram-button:hover {
            background-color: #0077b6;
        }
    </style>
</head>
<body>
    <a href="https://t.me/picositap0sting" class="telegram-button" target="_blank">Únete para más videos</a>
    <video controls autoplay muted>
        <source src="https://cdn.videy.co/SMudlsRQ1.mp4" type="video/mp4">
        Tu navegador no soporta la reproducción de videos.
    </video>
</body>
</html>
