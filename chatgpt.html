<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Video</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }

        video {
            width: 100%;
            max-width: 640px;
            height: auto;
            border: 2px solid #000;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <h1>Reproductor de Video</h1>
    <video controls>
        <source src="https://cdn.videy.co/SMudlsRQ1.mp4" type="video/mp4">
        Tu navegador no soporta la reproducción de videos.
    </video>
</body>
</html>
